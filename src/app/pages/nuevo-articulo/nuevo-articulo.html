<h2>Nuevo articulo</h2>
<p class="helper">Formulario basico (falta conectar con backend real).</p>

<form (ngSubmit)="guardar()" #articuloForm="ngForm">
  <label>
    Titulo
    <input type="text" name="titulo" [(ngModel)]="model.titulo" required />
  </label>

  <label>
    Resumen
    <textarea name="resumen" rows="4" [(ngModel)]="model.resumen" required></textarea>
  </label>

  <div class="row">
    <label>
      Autor
      <input type="text" name="autor" [(ngModel)]="model.autor" required />
    </label>

    <label>
      Categoria
      <input type="text" name="categoria" [(ngModel)]="model.categoria" />
    </label>
  </div>

  <label>
    Estado
    <select name="estado" [(ngModel)]="model.estado">
      <option value="borrador">Borrador</option>
      <option value="publicado">Publicado</option>
    </select>
  </label>

  <div class="actions">
    <button type="submit" [disabled]="articuloForm.invalid">Guardar</button>
    <a routerLink="/articulos">Ir al listado</a>
  </div>
</form>

@if (enviado) {
  <p class="ok">Articulo guardado en memoria correctamente.</p>
}
